<!-- index.html  (INGRESO AISMUN ACTUALIZADO CON NUEVO LOGO) -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISMUN Registro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
padding:15px;
}

.header{
background:#fff;
padding:22px;
border-radius:22px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.06);
margin-bottom:18px;
}

.header img{
width:100%;
max-width:520px;
border-radius:18px;
}

.container{
background:#fff;
padding:22px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
max-width:620px;
margin:auto;
}

h1{
text-align:center;
color:#0b3d91;
font-size:28px;
font-weight:800;
margin-bottom:8px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
font-size:13px;
font-weight:800;
}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ccd4e0;
font-size:15px;
outline:none;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:800;
cursor:pointer;
margin-top:16px;
}

.blue{
background:#0b3d91;
color:#fff;
}

.gray{
background:#eef2f8;
color:#0b3d91;
}

.persona{
margin-top:14px;
padding:14px;
border-radius:16px;
background:#f8fbff;
border:1px solid #e5ebf4;
}

.hidden{display:none;}

.ok{
text-align:center;
font-weight:800;
color:#0b3d91;
padding:15px;
}

@media(max-width:700px){
.row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.ibb.co/xKtvSvZ7/IMG-20260417-WA0011.jpg">
</div>

<div class="container">

<h1>REGISTRO AISMUN</h1>
<div class="sub">Bienvenidos a AISMUN</div>

<label>Cédula responsable</label>
<input id="cedula">

<label>Nombre completo</label>
<input id="nombre">

<div class="row">
<div>
<label>Teléfono</label>
<input id="telefono">
</div>

<div>
<label>Número de emergencia</label>
<input id="emergencia">
</div>
</div>

<label>Institución</label>
<input id="institucion">

<label>¿Viene en vehículo?</label>
<select id="vehiculo" onchange="toggleVehiculo()">
<option value="NO">No</option>
<option value="SI">Sí</option>
</select>

<div id="placaBox" class="hidden">
<label>Placa vehículo</label>
<input id="placa">
</div>

<label>¿Viene en bus institucional?</label>
<select id="bus" onchange="toggleBus()">
<option value="NO">No</option>
<option value="SI">Sí</option>
</select>

<div id="busBox" class="hidden">
<label>Placa bus</label>
<input id="placaBus">

<label>Cantidad de alumnos</label>
<input id="cantidadAlumnos" type="number">
</div>

<div id="acompanantes"></div>

<button class="btn gray" onclick="agregarPersona()">➕ Agregar acompañante</button>
<button class="btn blue" onclick="enviar()">Registrar ingreso</button>

<div id="msg"></div>

</div>

<script>
const URL_SCRIPT="https://script.google.com/macros/s/AKfycby-V1uzBGMZ5fIXwRZpKw7ceyMkZ9EJ-W2nEbv8e4WpQNZLedDR2XE4_V840mfJrzLbyQ/exec";

let contador=0;

function toggleVehiculo(){
document.getElementById("placaBox").classList.toggle("hidden",
document.getElementById("vehiculo").value!=="SI");
}

function toggleBus(){
document.getElementById("busBox").classList.toggle("hidden",
document.getElementById("bus").value!=="SI");
}

function agregarPersona(){
contador++;

let div=document.createElement("div");
div.className="persona";

div.innerHTML=`
<b>Acompañante #${contador}</b>

<label>Nombre completo</label>
<input class="anombre">

<label>Cédula</label>
<input class="acedula">
`;

document.getElementById("acompanantes").appendChild(div);
}

async function enviar(){

const cedula=document.getElementById("cedula").value.trim();
const nombre=document.getElementById("nombre").value.trim();
const telefono=document.getElementById("telefono").value.trim();
const emergencia=document.getElementById("emergencia").value.trim();
const institucion=document.getElementById("institucion").value.trim();
const vehiculo=document.getElementById("vehiculo").value;
const placa=document.getElementById("placa").value.trim();
const bus=document.getElementById("bus").value;
const placaBus=document.getElementById("placaBus").value.trim();
const cantidadAlumnos=document.getElementById("cantidadAlumnos").value.trim();

if(!cedula||!nombre||!telefono||!emergencia||!institucion){
alert("Complete todos los campos");
return;
}

let grupo="GRP-"+Date.now();

let personas=[{
tipo:"Responsable",
cedula,nombre,telefono,emergencia,institucion,
vehiculo,placa,bus,placaBus,cantidadAlumnos
}];

document.querySelectorAll(".anombre").forEach((n,i)=>{

let c=document.querySelectorAll(".acedula")[i];

if(n.value.trim()&&c.value.trim()){

personas.push({
tipo:"Acompañante",
cedula:c.value.trim(),
nombre:n.value.trim(),
telefono:"",
emergencia:"",
institucion,
vehiculo,placa,bus,placaBus,cantidadAlumnos
});

}

});

document.getElementById("msg").innerHTML="<div class='ok'>Registrando...</div>";

await fetch(URL_SCRIPT,{
method:"POST",
body:JSON.stringify({grupo,personas})
});

document.getElementById("msg").innerHTML="<div class='ok'>✅ Registro exitoso</div>";

setTimeout(()=>location.reload(),1500);

}
</script>

</body>
</html>
