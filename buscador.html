<!-- buscador.html -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador AISMUN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
padding:15px;
}

.header{
background:#fff;
padding:22px;
border-radius:22px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.06);
margin-bottom:18px;
}

.header img{
width:100%;
max-width:520px;
border-radius:18px;
}

.container{
background:#fff;
padding:18px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
max-width:950px;
margin:auto;
}

h1{
text-align:center;
color:#0b3d91;
font-size:30px;
font-weight:800;
margin-bottom:6px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:18px;
}

#buscar{
width:100%;
padding:22px;
font-size:22px;
font-weight:700;
border-radius:18px;
border:2px solid #0b3d91;
outline:none;
margin-bottom:18px;
}

.cards{
display:grid;
gap:14px;
}

.card{
background:#f8faff;
border:1px solid #e3e9f2;
border-radius:18px;
padding:14px;
}

.nombre{
font-size:18px;
font-weight:800;
color:#0b3d91;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
background:#fff;
padding:10px;
border-radius:12px;
border:1px solid #edf1f7;
}

.label{
font-size:11px;
font-weight:800;
color:#666;
margin-bottom:4px;
text-transform:uppercase;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.ibb.co/cKJ3XjfD/IMG-20260417-155121.jpg">
</div>

<div class="container">

<div class="sub">Buscar por nombre, cédula, colegio o placa</div>

<input id="buscar" placeholder="Buscar..." oninput="filtrar()">

<div id="resultados" class="cards"></div>

</div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/1M3KycbxkWjSfmu55qwAifzyypT1aHaX5RcTwOTPjwuA/gviz/tq?tqx=out:json";

let datos=[];

async function cargar(){

const res=await fetch(SHEET_URL);
const txt=await res.text();
const json=JSON.parse(txt.substring(47).slice(0,-2));

datos=json.table.rows.map(r=>{

const c=(r.c||[]).map(x=>x?x.v:"");

return{
cedula:c[2]||"",
nombre:c[3]||"",
institucion:c[6]||"",
placa:c[8]||"",
hora:c[12]||""
};

});

mostrar(datos);

}

function mostrar(lista){

let html="";

lista.forEach(x=>{

html+=`
<div class="card">

<div class="nombre">${x.nombre}</div>

<div class="grid">

<div class="item">
<div class="label">Cédula</div>
${x.cedula}
</div>

<div class="item">
<div class="label">Institución</div>
${x.institucion}
</div>

<div class="item">
<div class="label">Placa</div>
${x.placa}
</div>

<div class="item">
<div class="label">Hora</div>
${x.hora}
</div>

</div>
</div>
`;

});

document.getElementById("resultados").innerHTML=html;

}

function filtrar(){

let q=document.getElementById("buscar").value.toLowerCase();

let f=datos.filter(x=>

x.nombre.toLowerCase().includes(q)||
x.cedula.toLowerCase().includes(q)||
x.institucion.toLowerCase().includes(q)||
x.placa.toLowerCase().includes(q)

);

mostrar(f);

}

cargar();
</script>

</body>
</html>
