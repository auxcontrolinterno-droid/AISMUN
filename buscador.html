<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador AISMUN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
padding:15px;
}

.header{
background:#fff;
padding:18px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.06);
margin-bottom:18px;
}

.header img{
width:90%;
max-width:340px;
}

.container{
background:#fff;
padding:18px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
max-width:950px;
margin:auto;
}

h1{
text-align:center;
color:#0b3d91;
font-size:30px;
font-weight:800;
margin-bottom:6px;
}

.sub{
text-align:center;
color:#666;
font-size:14px;
margin-bottom:18px;
}

#buscar{
width:100%;
padding:22px;
font-size:22px;
font-weight:700;
border-radius:18px;
border:2px solid #0b3d91;
outline:none;
margin-bottom:18px;
background:#f8fbff;
}

.cards{
display:grid;
gap:14px;
}

.card{
background:#f8faff;
border:1px solid #e3e9f2;
border-radius:18px;
padding:14px;
}

.nombre{
font-size:18px;
font-weight:800;
color:#0b3d91;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
background:#fff;
padding:10px;
border-radius:12px;
border:1px solid #edf1f7;
word-break:break-word;
}

.label{
font-size:11px;
font-weight:800;
color:#666;
margin-bottom:4px;
text-transform:uppercase;
}

.total{
margin-top:18px;
text-align:center;
font-size:14px;
font-weight:700;
color:#555;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
#buscar{font-size:19px;padding:18px;}
h1{font-size:24px;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

<h1>BUSCADOR AISMUN</h1>
<div class="sub">Buscar por nombre, cédula, colegio, placa o bus</div>

<input
id="buscar"
type="text"
placeholder="Buscar ahora..."
oninput="filtrar()"
autocomplete="off">

<div id="resultados" class="cards"></div>
<div id="total" class="total"></div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1M3KycbxkWjSfmu55qwAifzyypT1aHaX5RcTwOTPjwuA/gviz/tq?tqx=out:json";

let datos = [];
let busquedaActual = "";

function texto(v){
return String(v || "").toLowerCase().trim();
}

function formatearHora(valor){

if(typeof valor === "string" && valor.includes("Date(")){

const nums = valor.match(/\d+/g);

if(nums && nums.length >= 6){

let h = nums[3].padStart(2,"0");
let m = nums[4].padStart(2,"0");
let s = nums[5].padStart(2,"0");

return h + ":" + m + ":" + s;
}

}

return valor || "";

}

async function cargar(){

try{

const res = await fetch(SHEET_URL);
const raw = await res.text();
const json = JSON.parse(raw.substring(47).slice(0,-2));

datos = json.table.rows.map(r=>{

const c = (r.c || []).map(x => x ? x.v : "");

return{
grupo:c[0] || "",
tipo:c[1] || "",
cedula:c[2] || "",
nombre:c[3] || "",
telefono:c[4] || "",
emergencia:c[5] || "",
institucion:c[6] || "",
vehiculo:c[7] || "",
placa:c[8] || "",
bus:c[9] || "",
placaBus:c[10] || "",
cantidad:c[11] || "",
hora:formatearHora(c[12]),
fecha:c[13] || ""
};

});

if(busquedaActual !== ""){
filtrar();
}else{
mostrar(datos);
}

}catch(e){

document.getElementById("resultados").innerHTML =
"<div style='text-align:center;color:red;font-weight:700;'>Error cargando datos</div>";

}

}

function mostrar(lista){

let html = "";

lista.forEach(x=>{

html += `
<div class="card">

<div class="nombre">${x.nombre}</div>

<div class="grid">

<div class="item">
<div class="label">Cédula</div>
${x.cedula}
</div>

<div class="item">
<div class="label">Institución</div>
${x.institucion}
</div>

<div class="item">
<div class="label">Placa</div>
${x.placa}
</div>

<div class="item">
<div class="label">Placa Bus</div>
${x.placaBus}
</div>

<div class="item">
<div class="label">Tipo</div>
${x.tipo}
</div>

<div class="item">
<div class="label">Hora</div>
${x.hora}
</div>

</div>

</div>
`;

});

document.getElementById("resultados").innerHTML = html;
document.getElementById("total").innerText = "Total resultados: " + lista.length;

}

function filtrar(){

busquedaActual = texto(document.getElementById("buscar").value);

if(busquedaActual === ""){
mostrar(datos);
return;
}

const filtrados = datos.filter(x=>{

const combinado = `
${x.grupo}
${x.tipo}
${x.cedula}
${x.nombre}
${x.telefono}
${x.emergencia}
${x.institucion}
${x.vehiculo}
${x.placa}
${x.bus}
${x.placaBus}
${x.cantidad}
${x.hora}
${x.fecha}
`.toLowerCase();

return combinado.includes(busquedaActual);

});

mostrar(filtrados);

}

cargar();
setInterval(cargar,10000);

</script>

</body>
</html>
