<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISMUN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
text-align:center;
}

.header{
background:#fff;
padding:18px 0;
border-bottom:2px solid #0b3d91;
}

.header img{
width:85%;
max-width:340px;
}

.container{
background:#fff;
width:92%;
max-width:540px;
margin:25px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:left;
}

h1{
margin:0;
text-align:center;
color:#0b3d91;
font-size:32px;
}

.sub{
text-align:center;
margin-bottom:20px;
color:#555;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
font-size:13px;
font-weight:700;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
margin-top:14px;
cursor:pointer;
}

.blue{
background:#0b3d91;
color:#fff;
}

.gray{
background:#eef2f8;
color:#0b3d91;
}

.persona{
margin-top:15px;
padding:15px;
border:1px solid #eee;
border-radius:14px;
background:#fafbfd;
}

.hidden{
display:none;
}

.ok{
text-align:center;
padding:18px;
font-weight:700;
color:#0b3d91;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

<div class="sub">Bienvenidos a AISMUN</div>

<label>Cédula responsable</label>
<input id="cedula">

<label>Nombre completo</label>
<input id="nombre">

<div class="row">
<div>
<label>Teléfono</label>
<input id="telefono">
</div>

<div>
<label>Número de emergencia</label>
<input id="emergencia">
</div>
</div>

<label>Institución</label>
<input id="institucion">

<label>¿Viene en vehículo particular?</label>
<select id="vehiculo" onchange="toggleVehiculo()">
<option value="NO">No</option>
<option value="SI">Sí</option>
</select>

<div id="placaBox" class="hidden">
<label>Placa vehículo</label>
<input id="placa">
</div>

<label>¿Viene en bus institucional?</label>
<select id="bus" onchange="toggleBus()">
<option value="NO">No</option>
<option value="SI">Sí</option>
</select>

<div id="busBox" class="hidden">

<label>Placa bus</label>
<input id="placaBus">

<label>Cantidad de alumnos</label>
<input id="cantidadAlumnos" type="number">

</div>

<div id="acompanantes"></div>

<button class="btn gray" onclick="agregarPersona()">➕ Agregar acompañante</button>

<button class="btn blue" onclick="enviar()">Registrar ingreso</button>

<div id="msg"></div>

</div>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby-V1uzBGMZ5fIXwRZpKw7ceyMkZ9EJ-W2nEbv8e4WpQNZLedDR2XE4_V840mfJrzLbyQ/exec";

let contador = 0;

function toggleVehiculo(){
document.getElementById("placaBox").classList.toggle(
"hidden",
document.getElementById("vehiculo").value !== "SI"
);
}

function toggleBus(){
document.getElementById("busBox").classList.toggle(
"hidden",
document.getElementById("bus").value !== "SI"
);
}

function agregarPersona(){

contador++;

const div = document.createElement("div");

div.className = "persona";

div.innerHTML = `
<b>Acompañante #${contador}</b>

<label>Nombre completo</label>
<input class="anombre">

<label>Cédula</label>
<input class="acedula">
`;

document.getElementById("acompanantes").appendChild(div);
}

async function enviar(){

const cedula = document.getElementById("cedula").value.trim();
const nombre = document.getElementById("nombre").value.trim();
const telefono = document.getElementById("telefono").value.trim();
const emergencia = document.getElementById("emergencia").value.trim();
const institucion = document.getElementById("institucion").value.trim();
const vehiculo = document.getElementById("vehiculo").value;
const placa = document.getElementById("placa").value.trim();
const bus = document.getElementById("bus").value;
const placaBus = document.getElementById("placaBus").value.trim();
const cantidadAlumnos = document.getElementById("cantidadAlumnos").value.trim();

if(!cedula || !nombre || !telefono || !emergencia || !institucion){
alert("Complete todos los campos");
return;
}

const grupo = "GRP-" + Date.now();

let personas = [];

personas.push({
tipo:"Responsable",
cedula,
nombre,
telefono,
emergencia,
institucion,
vehiculo,
placa,
bus,
placaBus,
cantidadAlumnos
});

const nombres = document.querySelectorAll(".anombre");
const cedulas = document.querySelectorAll(".acedula");

for(let i=0;i<nombres.length;i++){

if(nombres[i].value.trim() && cedulas[i].value.trim()){

personas.push({
tipo:"Acompañante",
cedula:cedulas[i].value.trim(),
nombre:nombres[i].value.trim(),
telefono:"",
emergencia:"",
institucion,
vehiculo,
placa,
bus,
placaBus,
cantidadAlumnos
});

}

}

document.getElementById("msg").innerHTML="<div class='ok'>Registrando...</div>";

await fetch(URL_SCRIPT,{
method:"POST",
body:JSON.stringify({grupo,personas})
});

document.getElementById("msg").innerHTML="<div class='ok'>✅ Registro exitoso</div>";

setTimeout(()=>{
location.reload();
},1500);

}

</script>

</body>
</html>
