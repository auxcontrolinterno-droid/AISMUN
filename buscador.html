<!-- SOLO CAMBIA EL CSS DEL INPUT POR ESTE -->

<style>

input{
width:100%;
padding:20px;
border-radius:18px;
border:2px solid #0b3d91;
box-sizing:border-box;
font-size:20px;
font-weight:700;
margin-bottom:22px;
outline:none;
transition:0.2s;
background:#f8fbff;
}

input:focus{
border-color:#092f6f;
box-shadow:0 0 0 4px rgba(11,61,145,.12);
transform:scale(1.01);
}

input::placeholder{
font-size:18px;
font-weight:600;
color:#7a7a7a;
}

@media(max-width:600px){

input{
padding:18px;
font-size:18px;
border-radius:16px;
}

input::placeholder{
font-size:16px;
}

}

</style>
