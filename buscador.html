<!-- buscador.html CORREGIDO + HORA FUNCIONANDO -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador AISMUN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
padding:15px;
}

.header{
background:#fff;
padding:22px;
border-radius:22px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.06);
margin-bottom:18px;
}

.header img{
width:100%;
max-width:520px;
border-radius:18px;
}

.container{
background:#fff;
padding:18px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
max-width:950px;
margin:auto;
}

h1{
text-align:center;
color:#0b3d91;
font-size:30px;
font-weight:800;
margin-bottom:6px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:18px;
}

#buscar{
width:100%;
padding:22px;
font-size:22px;
font-weight:700;
border-radius:18px;
border:2px solid #0b3d91;
outline:none;
margin-bottom:18px;
}

.cards{
display:grid;
gap:14px;
}

.card{
background:#f8faff;
border:1px solid #e3e9f2;
border-radius:18px;
padding:14px;
}

.nombre{
font-size:18px;
font-weight:800;
color:#0b3d91;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
background:#fff;
padding:10px;
border-radius:12px;
border:1px solid #edf1f7;
word-break:break-word;
}

.label{
font-size:11px;
font-weight:800;
color:#666;
margin-bottom:4px;
text-transform:uppercase;
}

.total
